name: Verify Pull Request

on:
  pull_request:
    branches:
      - main

jobs:
    lint:
        name: Run Linter
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Go   
              uses: actions/setup-go@v6
              with:
                go-version-file: "go.mod"

            - name: Run golangci-lint
              uses: golangci/golangci-lint-action@v9
              with:
                version: latest

    test:
        name: Run Tests
        runs-on: ubuntu-latest
        timeout-minutes: 5
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                go-version-file: 'go.mod'

            - name: Run tests
              run: go test ./...